<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .result-box {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 15px;
            padding: 30px 20px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-text {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            transition: all 0.1s ease;
        }

        .result-text.rolling {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .food-list {
            margin-top: 30px;
            text-align: left;
        }

        .food-list-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .food-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Tan's Table：今天吃什么</h1>
        
        <div class="result-box">
            <div class="result-text" id="result">点击开始</div>
        </div>
        
        <button class="button" id="startBtn" onclick="startRoll()">开始选择</button>
        
        <div class="food-list">
            <div class="food-list-title">可选菜品：</div>
            <div class="food-tags" id="foodTags"></div>
        </div>
    </div>

    <script>
        // 内置的菜肴选项
        const dishes = [
            "土豆焖鸡块", "烤五花肉+生菜+泡菜", "牛肉白萝卜粉丝汤", "潮汕版牛肉芹菜粉丝汤", 
            "冬瓜排骨汤", "莲藕排骨汤", "芋头腊肠焖饭", "胡萝卜牛腩汤",
            "酸辣土豆丝", "蒜蓉菜心", "清炒生菜", "椰子鸡",
            "红三剁", "酸菜肉沫粉丝", "意面（番茄酱/青酱）", "小馄饨",
            "酸奶碗", "开放吐司", "红烧肉炖土豆", "洋葱肥牛", "青椒炒肉", "番茄鸡蛋", "芋儿鸡", "手撕柠檬鸡", "蒜香鸡块" 
        ];

        let isRolling = false;
        let rollInterval;
        const resultEl = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');

        // 初始化显示菜品标签
        function initFoodTags() {
            const tagsContainer = document.getElementById('foodTags');
            dishes.forEach(dish => {
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.textContent = dish;
                tagsContainer.appendChild(tag);
            });
        }

        function startRoll() {
            if (isRolling) return;
            
            isRolling = true;
            startBtn.disabled = true;
            startBtn.textContent = "选择中...";
            resultEl.classList.add('rolling');

            let count = 0;
            const maxCount = 20; // 滚动次数
            let speed = 100; // 初始速度（毫秒）

            function roll() {
                // 随机显示一个菜品
                const randomIndex = Math.floor(Math.random() * dishes.length);
                resultEl.textContent = dishes[randomIndex];
                
                count++;

                if (count >= maxCount) {
                    // 滚动结束，显示最终结果
                    clearInterval(rollInterval);
                    resultEl.classList.remove('rolling');
                    resultEl.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        resultEl.style.transform = 'scale(1)';
                    }, 300);
                    startBtn.disabled = false;
                    startBtn.textContent = "再选一次";
                    isRolling = false;
                }
            }

            rollInterval = setInterval(roll, speed);
        }

        // 页面加载完成后初始化
        initFoodTags();
    </script>
</body>
</html>

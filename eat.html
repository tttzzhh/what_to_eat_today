<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .result-box {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 15px;
            padding: 40px 30px;
            margin-bottom: 30px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .result-text {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            transition: all 0.1s ease;
        }

        .result-text.rolling {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .result-text.reveal {
            animation: reveal 0.6s ease-out;
        }

        @keyframes reveal {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Tan's Table：今天吃什么</h1>
        
        <div class="result-box">
            <div class="result-text" id="result">点击开始</div>
        </div>
        
        <button class="button" id="startBtn" onclick="startRoll()">开始选择</button>
        
    </div>

    <script>
        // 内置的菜肴选项
        const dishes = [
            "土豆焖鸡块", "烤五花肉+生菜+泡菜", "牛肉白萝卜粉丝汤", 
            "潮汕版牛肉芹菜粉丝汤", "冬瓜排骨汤", "莲藕排骨汤", 
            "芋头腊肠焖饭", "胡萝卜牛腩汤", "酸辣土豆丝", "蒜蓉菜心", 
            "清炒生菜", "椰子鸡", "红三剁", "酸菜肉沫粉丝", 
            "意面（番茄酱/青酱）", "小馄饨", "酸奶碗", "开放吐司", 
            "红烧肉炖土豆", "洋葱肥牛", "青椒炒肉", "番茄鸡蛋", 
            "芋儿鸡", "手撕柠檬鸡", "蒜香鸡块", "蒜蓉西兰花"
        ];

        let isRolling = false;
        let rollInterval;
        const resultEl = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');

        function startRoll() {
            if (isRolling) return;
            
            isRolling = true;
            startBtn.disabled = true;
            startBtn.textContent = "选择中...";
            resultEl.classList.add('rolling');

            let count = 0;
            const totalTime = 3000; // 总时长3秒
            let speed = 25; // 初始速度，进一步加快

            function roll() {
                // 随机显示一个菜品
                const randomIndex = Math.floor(Math.random() * dishes.length);
                resultEl.textContent = dishes[randomIndex];
                
                count++;
                
                // 计算已用时间
                const elapsedTime = count * speed;

                if (elapsedTime >= totalTime) {
                    // 滚动结束，显示最终结果
                    clearInterval(rollInterval);
                    resultEl.classList.remove('rolling');
                    
                    // 添加揭晓动画效果
                    resultEl.classList.add('reveal');
                    
                    startBtn.disabled = false;
                    startBtn.textContent = "再选一次";
                    isRolling = false;
                    
                    // 动画结束后移除class，方便下次使用
                    setTimeout(() => {
                        resultEl.classList.remove('reveal');
                    }, 600);
                }
            }

            rollInterval = setInterval(roll, speed);
        }
    </script>
</body>
</html>
